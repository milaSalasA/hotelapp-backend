<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecimiento de Contraseña</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #007bff;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 30px;
            color: #333333;
            line-height: 1.6;
        }
        .footer {
            background-color: #f8f9fa;
            color: #777777;
            padding: 15px;
            text-align: center;
            font-size: 12px;
        }
        .button {
            display: inline-block;
            padding: 12px 25px;
            margin-top: 20px;
            background-color: #28a745;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Hotelapp</h1>
    </div>
    <div class="content">
        <p>Hola <strong th:text="${username}">Usuario</strong>,</p>
        <p>Para continuar, debes hacer un restablecimiento de contraseña haciendo clic en el siguiente enlace:</p>
        <div style="text-align: center;">
            <a th:href="${resetUrl}" class="button">Restablecer Contraseña</a>
        </div>
        <p style="margin-top: 30px;">O copia y pega este enlace en tu navegador:</p>
        <p style="word-break: break-all; color: #007bff;" th:text="${resetUrl}">http://localhost:4200/reset</p>
    </div>
    <div class="footer">
        &copy; 2026 Hotelapp. Todos los derechos reservados.
    </div>
</div>
</body>
</html>
